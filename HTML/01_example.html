<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  header {
    background-color: #ca817b;
    width: auto;
    height: 70px;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px 0 50px;
  }

  strong {
    color: white;
    font-size: 30px;
  }

  nav {
    display: inline;
  }

  nav a{
    color: white;
    text-decoration: none;
    list-style: none;
    padding: 0 30px 0 30px;
  }

  div a {
    padding: 0 10px 0 10px;
  }

  div a img {
    width: 2.5vw;
    height: auto;
  }
</style>
<body>
  <header>
    <strong>MoGo</strong>
    <nav>
      <a href="#about">ABOUT</a>
      <a href="#service">SERVICE</a>
      <a href="#work">WORK</a>
      <a href="#blog">BLOG</a>
      <a href="#contact">CONTACT</a>
    </nav>
    <div>
      <a href="#shopping">
        <img src="./img/shopping-logo.svg">
      </a>
      <a href="#search">
        <img src="./img/search-logo.svg">
      </a>
    </div>
  </header>
</body>
</html>
